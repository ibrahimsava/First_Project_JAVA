spring.application.name=demo


# 1. URL de la base de données (on pointe vers la base "training" que vous avez créée)
spring.datasource.url=jdbc:mysql://localhost:3306/demo

# 2. Identifiants
spring.datasource.username=root
spring.datasource.password=09152T049t@

# 3. Driver MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuration Hibernate / JPA
# "update" permet de créer ou modifier les tables automatiquement selon vos classes @Entity
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console (très utile pour débugger)
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
